trigger:
  - main

pool:
  name: Default

variables:
  buildConfiguration: Release
  dockerUser: senseilimao1
  apiImage: orderprocessing-api
  workerImage: orderprocessing-worker

steps:
  
  # ======================
  # LOGIN DOCKER HUB
  # ======================
  - script: echo $(DOCKER_PASSWORD) | docker login -u $(DOCKER_USER) --password-stdin
    displayName: Docker Login
  
  # ======================
  # BUILD & PUSH API
  # ======================
  - script: |
      docker build -t $(dockerUser)/$(apiImage):$(Build.BuildId) -f OrderProcessing.API/Dockerfile .
      docker push $(dockerUser)/$(apiImage):$(Build.BuildId)
    displayName: Build & Push API
  
  # ======================
  # BUILD & PUSH WORKER
  # ======================
  - script: |
      docker build -t $(dockerUser)/$(workerImage):$(Build.BuildId) -f OrderProcessing.Worker/Dockerfile .
      docker push $(dockerUser)/$(workerImage):$(Build.BuildId)
    displayName: Build & Push Worker